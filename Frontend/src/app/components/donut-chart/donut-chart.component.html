<div class="flex w-full h-full justify-center items-center">
    <div class="w-52 mx-auto text-center font-sans">
        <h1 class="text-xl font-bold">{{mainTitle | translate}}</h1>
        <div class="relative mt-2">
            <svg class="w-full h-auto -rotate-90" viewBox="0 0 100 100">
                <circle class="donutChartResidualPart" cx="50" cy="50" r="45" />
                <circle class="fg donutChartMainPart" cx="50" cy="50" r="45" [attr.stroke-dasharray]="circumference"
                    [attr.stroke-dashoffset]="offset" />
            </svg>
            <div class="absolute inset-0 flex items-center justify-center">
                <span class="text-4xl font-semibold">
                    {{percentage}}%
                </span>
            </div>
        </div>
        <div class="mt-4 flex justify-around text-sm">
            <div class="flex items-center gap-1">
                <span class="w-3 h-3 rounded-full donutChartMainPart"></span>
                {{mainPart | translate}}
            </div>
            <div class="flex items-center gap-1">
                <span class="w-3 h-3 rounded-full donutChartResidualPart"></span>
                {{residualPart | translate}}
            </div>
        </div>
        <p *ngIf="(percentage === 0)" class="mt-2 font-bold text-sm">{{'error.noData' | translate}}</p>
    </div>
</div>
