<mat-card class="m-4 h-[calc(100%-32px)] flex flex-col shadow-lg rounded-xl bg-white">
    <div class="w-full p-6 rounded-t-xl bg-primary-100">
        <h2 class="font-bold text-xl text-gray-800">
            {{"label.reportHistory" | translate}}
        </h2>
        <p class="text-sm text-gray-600">
            {{reportedUser?.username}} {{reportedUser?.lastname}}
        </p>
    </div>
    <div class="flex-1 p-6 bg-gray-50 overflow-y-auto">
        <div class="space-y-4">
            <div *ngFor="let item of reports"
                class="w-3/4 mx-auto rounded-2xl shadow-lg overflow-hidden border border-gray-200">
                <div class="reports text-white px-6 py-4 
            flex flex-col sm:flex-row sm:items-center sm:justify-between gap-2">
                    <h2 class="text-lg font-semibold">
                        {{ item.subject }}
                    </h2>
                    <p class="text-sm opacity-80">
                        {{ item.timestamp | date: 'dd.MM.yyyy' }}
                    </p>
                </div>
                <div class="bg-white px-6 py-4 space-y-3">
                    <p class="text-gray-700">
                        {{ item.description }}
                    </p>
                    <div class="text-sm text-gray-500">
                        {{'label.reporter'}}:
                        <span class="font-medium text-gray-800">
                            {{ item.reporterUserName }}
                        </span>
                    </div>
                </div>
            </div>
        </div>
    </div>
    <div class="flex items-center gap-3 px-6 py-4 bg-primary-100">
        <form class="flex-1">
            <mat-form-field class="w-full">
                <mat-label>{{'label.addMessage' | translate}}</mat-label>
                <textarea matInput id="content" [(ngModel)]="content" name="content"></textarea>
            </mat-form-field>
        </form>
        <button mat-fab (click)="disableReport()" class="mb-6">
            <mat-icon>send</mat-icon>
        </button>
    </div>
</mat-card>
