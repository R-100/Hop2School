<mat-card appearance="outlined" class="m-4" style="height: calc(100% - 32px);">
    <mat-card-content class="h-full p-0 relative">
        <div class="relative h-full w-full">
            <app-multi-map [doubleAdressFunction]="true" (openRidesCardEvent)="openRidesCardHandler($event)" (openRideSaleEvent)="openRideSaleHandler($event)" [rides]="rides" [markerButton]="true"
                [isRadiusSearchActive]="true" [radius]="radius" class="absolute inset-0 z-0"></app-multi-map>
        </div>
        <div class="absolute top-8 w-full">
            <h1 class="flex justify-center text-3xl font-bold">{{'label.findRide' | translate}}</h1>
        </div>
        <div class="absolute top-5 left-5 z-10">
            <button mat-mini-fab (click)="showSearchControl = !showSearchControl" matTooltip="{{'tooltip.findRide' | translate}}">
                <mat-icon>search</mat-icon>
            </button>
        </div>
        <div *ngIf="showSearchControl" class="absolute top-18 left-5 findCard rounded-xl shadow-lg p-4 w-64 z-10">
            <div class="m-1">
                <h2 class="flex justify-center text-xl font-bold">{{'label.searchFunction' | translate}}</h2>
                <mat-divider></mat-divider>
                <mat-checkbox class="example-margin" [(ngModel)]="isFreeRides" (ngModelChange)="changeFreeRidesStatus($event)">{{'label.onlyFreeRides | translate'}}</mat-checkbox>
                <mat-checkbox class="example-margin" [(ngModel)]="isRadiusSearchActive" (ngModelChange)="changeRadiusStatus($event)">{{'activeSearchRides' | translate}}</mat-checkbox>
                <div *ngIf="isRadiusSearchActive" class="flex justify-center">
                    <div class="flex items-center w-full gap-2">
                        <p class="whitespace-nowrap flex-shrink-0">{{ radius }} km</p>
                        <div class="w-64 flex-shrink-0">
                            <mat-slider min="1" max="100" step="1" showTickMarks>
                                <input matSliderThumb [(ngModel)]="radius" />
                            </mat-slider>
                        </div>
                    </div>
                </div>
                <mat-checkbox class="example-margin" [(ngModel)]="isSearchDriveDate" (ngModelChange)="filter()">{{'input.startDate' | translate}}</mat-checkbox>
                <div *ngIf="isSearchDriveDate" class="flex justify-center">
                    <input type="date" [(ngModel)]="startDate" (ngModelChange)="filter()">
                </div>
                <mat-checkbox class="example-margin" [(ngModel)]="isSearchDriveTimes" (ngModelChange)="filter()">{{'input.startEndTime' | translate}}</mat-checkbox>
                <div *ngIf="isSearchDriveTimes" class="flex justify-center">
                    <input type="time" [(ngModel)]="startTime" (ngModelChange)="filter()"> -> <input type="time" [(ngModel)]="endTime" (ngModelChange)="filter()">
                </div>
            </div>
        </div>
        <div *ngIf="isOpenFindRidesCard" class="absolute bottom-10 right-5 findCard rounded-xl shadow-lg p-4 w-1/2 z-10">
            <div class="m-1">
                <app-ride-list class="w-full" [isFindCardRide]="true" [rides]="findRidesCard" mainTitle="label.ridesOption"></app-ride-list>
                <div class="flex justify-end flex-wrap">
                    <button mat-flat-button (click)="isOpenFindRidesCard = false">{{'button.closed' | translate}}</button>
                </div>
            </div>
        </div>
    </mat-card-content>
</mat-card>
